<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Cumpleaños Karina 🎂</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      background: linear-gradient(to bottom, #87cefa 0%, #bde9ff 60%, #eaf9ff 100%);
      color: white;
      text-align: center;
      min-height: 100vh;
      position: relative;
    }

    h1 {
      font-size: 52px;
      margin-top: 40px;
      margin-bottom: 10px;
      text-shadow: 4px 4px #000;
      position: relative;
      z-index: 5;
      padding: 0 16px;
    }

    .box {
      margin: 20px auto 0;
      background: rgba(0, 0, 0, 0.28);
      padding: 24px;
      border-radius: 18px;
      display: inline-block;
      position: relative;
      z-index: 5;
      box-shadow: 0 0 20px rgba(0,0,0,0.18);
      max-width: 90%;
    }

    p {
      font-size: 24px;
      text-shadow: 2px 2px #000;
      margin: 10px 0;
    }

    .btn {
      margin-top: 18px;
      padding: 12px 22px;
      font-size: 18px;
      background: #e52521;
      color: white;
      border: 3px solid #000;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 3px 3px #000;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .cloud {
      position: absolute;
      width: 130px;
      opacity: 0.98;
      z-index: 1;
      image-rendering: pixelated;
    }

    .cloud1 {
      top: 40px;
      left: 30px;
    }

    .cloud2 {
      top: 90px;
      right: 40px;
    }

    .cloud3 {
      top: 170px;
      left: 30%;
    }

    .mountain {
      position: absolute;
      bottom: 120px;
      width: 0;
      height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-bottom: 260px solid #8b5a2b;
      z-index: 1;
    }

    .mountain::after {
      content: "";
      position: absolute;
      left: -160px;
      top: 25px;
      width: 0;
      height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-bottom: 235px solid #a86f3d;
    }

    .m1 {
      left: 30px;
    }

    .m2 {
      left: 280px;
      transform: scale(0.85);
    }

    .m3 {
      right: 90px;
      transform: scale(1.05);
    }

    .hill {
      position: absolute;
      bottom: 90px;
      width: 220px;
      height: 140px;
      background: #2faa2f;
      border-radius: 50% 50% 0 0;
      border: 4px solid #000;
      z-index: 2;
    }

    .hill1 {
      left: 70px;
    }

    .hill2 {
      left: 330px;
      width: 260px;
      height: 160px;
    }

    .hill3 {
      right: 90px;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 95px;
      background: repeating-linear-gradient(
        90deg,
        #c46b2d 0px,
        #c46b2d 40px,
        #a35422 40px,
        #a35422 80px
      );
      border-top: 6px solid #000;
      z-index: 3;
    }

    .block {
      position: absolute;
      width: 60px;
      height: 60px;
      background: #d08b3e;
      border: 4px solid #000;
      box-shadow: inset 0 0 0 4px #e8b55f;
      z-index: 4;
    }

    .block1 {
      top: 220px;
      left: 140px;
    }

    .block2 {
      top: 220px;
      left: 205px;
    }

    .block3 {
      top: 220px;
      left: 270px;
    }

    .block4 {
      top: 190px;
      right: 180px;
    }

    .mario {
      position: absolute;
      bottom: 95px;
      right: 90px;
      width: 110px;
      z-index: 5;
      image-rendering: pixelated;
    }

    .yoshi {
  position: absolute;
  bottom: 75px;
  left: 40px; /* lo movemos más a la izquierda */
  width: 120px;
  z-index: 10; /* más alto que todo */
}
    .tree {
      position: absolute;
      bottom: 95px;
      width: 28px;
      height: 90px;
      background: #8b4513;
      z-index: 3;
    }

    .tree::before {
      content: "";
      position: absolute;
      bottom: 55px;
      left: -36px;
      width: 100px;
      height: 100px;
      background: #1f8f2e;
      border-radius: 50%;
      border: 4px solid #000;
    }

    .tree1 {
      left: 560px;
    }

    .tree2 {
      right: 300px;
    }

    @media (max-width: 768px) {
      body {
        min-height: 100svh;
      }

      h1 {
        font-size: 28px;
        margin-top: 24px;
        line-height: 1.25;
        padding: 0 12px;
      }

      .box {
        width: calc(100% - 24px);
        max-width: 420px;
        padding: 16px 14px;
        margin-top: 18px;
      }

      p {
        font-size: 16px;
        line-height: 1.5;
      }

      .btn {
        font-size: 16px;
        padding: 10px 16px;
      }

      .cloud {
        width: 88px;
      }

      .cloud1 {
        top: 55px;
        left: 8px;
      }

      .cloud2 {
        top: 90px;
        right: 10px;
      }

      .cloud3 {
        top: 180px;
        left: 50%;
        transform: translateX(-50%);
      }

      .block {
        width: 42px;
        height: 42px;
      }

      .block1 {
        top: 210px;
        left: 18px;
      }

      .block2 {
        top: 210px;
        left: 64px;
      }

      .block3 {
        top: 210px;
        left: 110px;
      }

      .block4 {
        top: 210px;
        right: 16px;
      }

      .mario {
        width: 78px;
        right: 12px;
        bottom: 95px;
      }

      .yoshi {
        width: 82px;
        left: 12px;
        bottom: 108px;
      }

      .hill1 {
        left: -10px;
        width: 160px;
        height: 100px;
      }

      .hill2 {
        left: 95px;
        width: 180px;
        height: 115px;
      }

      .hill3 {
        right: -20px;
        width: 150px;
        height: 95px;
      }

      .mountain {
        border-left: 95px solid transparent;
        border-right: 95px solid transparent;
        border-bottom: 170px solid #8b5a2b;
        bottom: 95px;
      }

      .mountain::after {
        left: -95px;
        top: 18px;
        border-left: 95px solid transparent;
        border-right: 95px solid transparent;
        border-bottom: 150px solid #a86f3d;
      }

      .m1 {
        left: -15px;
      }

      .m2 {
        left: 75px;
        transform: scale(0.9);
      }

      .m3 {
        right: -10px;
        transform: scale(0.95);
      }

      .tree1 {
        left: 210px;
      }

      .tree2 {
        display: none;
      }

      .tree {
        width: 20px;
        height: 72px;
        bottom: 95px;
      }

      .tree::before {
        left: -25px;
        width: 70px;
        height: 70px;
        bottom: 42px;
      }
    }
  </style>
</head>
<body>

  <img src="cloud.png" class="cloud cloud1" alt="Nube">
  <img src="cloud.png" class="cloud cloud2" alt="Nube">
  <img src="cloud.png" class="cloud cloud3" alt="Nube">

  <div class="mountain m1"></div>
  <div class="mountain m2"></div>
  <div class="mountain m3"></div>

  <div class="hill hill1"></div>
  <div class="hill hill2"></div>
  <div class="hill hill3"></div>

  <div class="tree tree1"></div>
  <div class="tree tree2"></div>

  <div class="block block1"></div>
  <div class="block block2"></div>
  <div class="block block3"></div>
  <div class="block block4"></div>

  <h1>🎉 Feliz Cumpleaños Karina 🎉</h1>

  <div class="box">
    <p>Para la mejor hermana del mundo ❤️</p>
    <p>Que Dios te bendiga hoy y siempre 🙏</p>
    <button class="btn" onclick="document.getElementById('music').play()">
      ▶️ Toca aquí
    </button>
  </div>

  <img src="yoshi2.png?v=2" class="yoshi" alt="Yoshi">
  <img src="mario.png" class="mario" alt="Mario">

  <div class="ground"></div>

  <audio id="music" loop>
    <source src="Super Mario World Donut Plains Extended.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
