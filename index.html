<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Feliz Cumpleaños Karina 🎂</title>
  <style>
    body {
      margin: 0;
      text-align: center;
      font-family: 'Courier New', monospace;
      background: linear-gradient(#5c94fc, #c0e8ff);
      color: #fff;
    }

    h1 {
      font-size: 50px;
      margin-top: 100px;
      text-shadow: 3px 3px #000;
    }

    p {
      font-size: 24px;
      text-shadow: 2px 2px #000;
    }

    .box {
      margin-top: 50px;
      background: rgba(0,0,0,0.3);
      padding: 20px;
      border-radius: 15px;
      display: inline-block;
    }

    .btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      background: red;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>🎉 Feliz Cumpleaños Karina 🎉</h1>

  <div class="box">
    <p>Para la mejor hermana del mundo ❤️</p>
    <p>Que Dios te bendiga hoy y siempre 🙏</p>

    <button class="btn" onclick="document.getElementById('music').play()">
      ▶️ Toca aquí
    </button>
  </div>

  <audio id="music" loop>
    <source src="mario.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
