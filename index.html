<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feliz Cumpleaños Karina 🎂</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      background: linear-gradient(to bottom, #5c94fc 0%, #87ceeb 70%, #cfefff 100%);
      color: white;
      text-align: center;
      height: 100vh;
      position: relative;
    }

    h1 {
      font-size: 52px;
      margin-top: 70px;
      text-shadow: 4px 4px #000;
      position: relative;
      z-index: 5;
    }

    .box {
      margin: 30px auto 0;
      background: rgba(0, 0, 0, 0.35);
      padding: 24px;
      border-radius: 18px;
      display: inline-block;
      position: relative;
      z-index: 5;
      box-shadow: 0 0 20px rgba(0,0,0,0.25);
    }

    p {
      font-size: 24px;
      text-shadow: 2px 2px #000;
      margin: 10px 0;
    }

    .btn {
      margin-top: 18px;
      padding: 12px 22px;
      font-size: 18px;
      background: #e52521;
      color: white;
      border: 3px solid #000;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
      box-shadow: 3px 3px #000;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .cloud {
      position: absolute;
      width: 140px;
      opacity: 0.95;
      z-index: 1;
    }

    .cloud1 {
      top: 40px;
      left: 60px;
    }

    .cloud2 {
      top: 100px;
      right: 100px;
    }

    .cloud3 {
      top: 180px;
      left: 30%;
    }

    .mountain {
      position: absolute;
      bottom: 120px;
      width: 0;
      height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-bottom: 260px solid #8b5a2b;
      z-index: 1;
    }

    .mountain::after {
      content: "";
      position: absolute;
      left: -160px;
      top: 25px;
      width: 0;
      height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-bottom: 235px solid #a86f3d;
    }

    .m1 {
      left: 40px;
    }

    .m2 {
      left: 280px;
      transform: scale(0.85);
    }

    .m3 {
      right: 120px;
      transform: scale(1.1);
    }

    .hill {
      position: absolute;
      bottom: 90px;
      width: 220px;
      height: 140px;
      background: #2faa2f;
      border-radius: 50% 50% 0 0;
      border: 4px solid #000;
      z-index: 2;
    }

    .hill1 {
      left: 80px;
    }

    .hill2 {
      left: 360px;
      width: 260px;
      height: 160px;
    }

    .hill3 {
      right: 120px;
    }

    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 95px;
      background: repeating-linear-gradient(
        90deg,
        #c46b2d 0px,
        #c46b2d 40px,
        #a35422 40px,
        #a35422 80px
      );
      border-top: 6px solid #000;
      z-index: 3;
    }

    .block {
      position: absolute;
      width: 60px;
      height: 60px;
      background: #d08b3e;
      border: 4px solid #000;
      box-shadow: inset 0 0 0 4px #e8b55f;
      z-index: 4;
    }

    .block1 {
      top: 220px;
      left: 180px;
    }

    .block2 {
      top: 220px;
      left: 245px;
    }

    .block3 {
      top: 220px;
      left: 310px;
    }

    .block4 {
      top: 180px;
      right: 240px;
    }

    .mario {
      position: absolute;
      bottom: 95px;
      right: 120px;
      width: 110px;
      z-index: 4;
    }

    .yoshi {
      position: absolute;
      bottom: 95px;
      left: 110px;
      width: 130px;
      z-index: 4;
    }

    .tree {
      position: absolute;
      bottom: 95px;
      width: 28px;
      height: 90px;
      background: #8b4513;
      z-index: 3;
    }

    .tree::before {
      content: "";
      position: absolute;
      bottom: 55px;
      left: -36px;
      width: 100px;
      height: 100px;
      background: #1f8f2e;
      border-radius: 50%;
      border: 4px solid #000;
    }

    .tree1 {
      left: 620px;
    }

    .tree2 {
      right: 340px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 34px;
        margin-top: 50px;
        padding: 0 10px;
      }

      p {
        font-size: 18px;
      }

      .box {
        width: 90%;
      }

      .mario {
        width: 80px;
        right: 20px;
      }

      .yoshi {
        width: 95px;
        left: 20px;
      }

      .block1, .block2, .block3 {
        top: 260px;
      }

      .block4 {
        top: 210px;
        right: 40px;
      }

      .m2, .m3, .tree2 {
        display: none;
      }
    }
  </style>
</head>
<body>

  <img src="cloud.png" class="cloud cloud1" alt="Nube">
  <img src="cloud.png" class="cloud cloud2" alt="Nube">
  <img src="cloud.png" class="cloud cloud3" alt="Nube">

  <div class="mountain m1"></div>
  <div class="mountain m2"></div>
  <div class="mountain m3"></div>

  <div class="hill hill1"></div>
  <div class="hill hill2"></div>
  <div class="hill hill3"></div>

  <div class="tree tree1"></div>
  <div class="tree tree2"></div>

  <div class="block block1"></div>
  <div class="block block2"></div>
  <div class="block block3"></div>
  <div class="block block4"></div>

  <h1>🎉 Feliz Cumpleaños Karina 🎉</h1>

  <div class="box">
    <p>Para la mejor hermana del mundo ❤️</p>
    <p>Que Dios te bendiga hoy y siempre 🙏</p>
    <button class="btn" onclick="document.getElementById('music').play()">
      ▶️ Toca aquí
    </button>
  </div>

  <img src="yoshi.png" class="yoshi" alt="Yoshi">
  <img src="mario.png" class="mario" alt="Mario">

  <div class="ground"></div>

  <audio id="music" loop>
    <source src="Super Mario World Donut Plains Extended.mp3" type="audio/mpeg">
  </audio>

</body>
</html>
